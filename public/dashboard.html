<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - notebook</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Dashboard-specific overrides and styling */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            align-items: start;
            padding-top: 100px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .upload-card {
            position: sticky;
            top: 90px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
        }

        .files-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            min-height: 500px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            color: #fff;
            outline: none;
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .file-input-wrapper {
            position: relative;
            background: rgba(0, 0, 0, 0.25);
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .file-input-wrapper:hover {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.05);
        }

        .file-input-real {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-input-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .file-input-label svg {
            color: var(--primary);
        }

        /* Sleek Modern Table */
        .table-responsive {
            overflow-x: auto;
            margin-top: 1.5rem;
        }

        .files-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .files-table th,
        .files-table td {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
        }

        .files-table th {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .files-table td {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .files-table tbody tr {
            transition: var(--transition-smooth);
        }

        .files-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .status-box.info {
            display: block;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            color: var(--secondary);
        }

        .status-box.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-box.error {
            display: block;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--error);
        }

        .btn-table-download {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: var(--transition-smooth);
        }

        .btn-table-download:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .badge-visibility {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .badge-public {
            background: rgba(6, 182, 212, 0.15);
            color: var(--secondary);
            border: 1px solid rgba(6, 182, 212, 0.25);
        }

        .badge-private {
            background: rgba(244, 63, 94, 0.15);
            color: var(--error);
            border: 1px solid rgba(244, 63, 94, 0.25);
        }

        @media (max-width: 992px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            .upload-card {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>

<body>
    <script>
        // Inline authentication check before rendering DOM elements
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = "login.html";
        }
    </script>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-brand" onclick="window.location.href='index.html'">
            <span class="brand-name">notebook</span>
        </div>
        <!-- Hamburger Menu Button -->
        <button class="navbar-toggle" onclick="toggleMobileMenu()" aria-label="Toggle navigation">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="feather feather-menu">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="navbar-menu" id="nav-auth">
            <a href="index.html" class="nav-item">Home</a>
            <a href="explore.html" class="nav-item">Explore Notes</a>
            <a href="dashboard.html" class="nav-item active">Dashboard</a>
            <a href="chat.html" class="nav-item">AI Chat</a>
            <button class="nav-item btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Dashboard Container -->
    <div class="dashboard-layout">
        <!-- Sidebar Panel: Upload Document -->
        <div class="upload-card">
            <h3
                style="font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; color: #fff; display: flex; align-items: center; gap: 0.5rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="feather feather-upload-cloud">
                    <polyline points="16 16 12 12 8 16"></polyline>
                    <line x1="12" y1="12" x2="12" y2="21"></line>
                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                    <polyline points="16 16 12 12 8 16"></polyline>
                </svg>
                Upload Document
            </h3>

            <div class="form-group">
                <label for="visibilitySelect">Visibility</label>
                <select id="visibilitySelect" class="form-control" onchange="toggleVisibilityFields()">
                    <option value="public" selected>Public (Share with Community)</option>
                    <option value="private">Private (Only You Can Access)</option>
                </select>
            </div>

            <div class="form-group" id="folderGroup">
                <label for="folderSelect">Subject / Destination Folder</label>
                <select id="folderSelect" class="form-control">
                    <option value="">Loading subjects...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select PDF Document</label>
                <div class="file-input-wrapper">
                    <input type="file" id="pdfFile" class="file-input-real" accept=".pdf"
                        onchange="updateFileNameLabel()">
                    <div class="file-input-label" id="file-label">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="feather feather-file-text">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        <span id="file-name-text">Click or drag PDF here</span>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" id="btnUpload" onclick="uploadPDF()"
                style="width: 100%; margin-top: 1rem;">Upload</button>

            <div id="statusBox" class="status-box"></div>
        </div>

        <!-- Main Files List Panel -->
        <div class="files-card">
            <div
                style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;">
                <h3 style="font-size: 1.4rem; font-weight: 700; color: #fff;">My Notebook Portal</h3>

                <!-- Quick Search -->
                <input type="text" id="files-search" class="form-control" placeholder="Search my files..."
                    style="max-width: 250px; padding: 0.5rem 1rem;">
            </div>

            <div class="table-responsive">
                <table class="files-table">
                    <thead>
                        <tr>
                            <th>Document Name</th>
                            <th>Subject</th>
                            <th>Visibility</th>
                            <th>Uploaded At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="filesTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">
                                Loading documents...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-nav">
        <nav class="nav-links">
            <a href="https://github.com/Sc4redCr0w/" class="nav-link" target="_blank" rel="noopener noreferrer" title="GitHub">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-github"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            </a>
            <a href="https://www.linkedin.com/in/gaurav-yadav-3961a734b/" class="nav-link" target="_blank" rel="noopener noreferrer" title="LinkedIn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-linkedin"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
            </a>
        </nav>
    </footer>

    <script>
        // Setup variables
        const uId = localStorage.getItem("userId");
        let allFiles = [];

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            window.location.href = "index.html";
        }

        function showStatus(message, type) {
            const statusBox = document.getElementById("statusBox");
            if (!statusBox) return;
            statusBox.innerText = message;
            statusBox.className = `status-box ${type}`;
        }

        function updateFileNameLabel() {
            const fileInput = document.getElementById("pdfFile");
            const fileNameText = document.getElementById("file-name-text");
            if (fileInput.files.length > 0) {
                fileNameText.textContent = fileInput.files[0].name;
            } else {
                fileNameText.textContent = "Click or drag PDF here";
            }
        }

        // Fetch S3 directories
        async function loadFolders() {
            try {
                const response = await fetch("/folders", {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }

                const folders = await response.json();
                const dropdown = document.getElementById("folderSelect");
                dropdown.innerHTML = "";

                if (folders.length === 0) {
                    const opt = document.createElement("option");
                    opt.value = "default";
                    opt.textContent = "default";
                    dropdown.appendChild(opt);
                } else {
                    folders.forEach(folder => {
                        const option = document.createElement("option");
                        option.value = folder;
                        option.textContent = folder;
                        dropdown.appendChild(option);
                    });
                }
            } catch (error) {
                console.error(error);
                showStatus("Failed to load folders", "error");
            }
        }

        // Toggle visibility fields
        function toggleVisibilityFields() {
            const visibility = document.getElementById("visibilitySelect").value;
            const folderGroup = document.getElementById("folderGroup");
            if (visibility === "private") {
                folderGroup.style.display = "none";
            } else {
                folderGroup.style.display = "block";
            }
        }

        // Retrieve list of files owned by user or shared publicly
        async function loadFilesList() {
            const tableBody = document.getElementById("filesTableBody");

            try {
                const response = await fetch("/files", {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }

                allFiles = await response.json();

                // Sort files by upload date descending
                allFiles.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

                renderFilesTable(allFiles);

            } catch (error) {
                console.error(error);
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--error)">Failed to retrieve database records.</td></tr>`;
            }
        }

        function renderFilesTable(files) {
            const tableBody = document.getElementById("filesTableBody");
            tableBody.innerHTML = "";

            if (files.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 3rem;">No documents uploaded yet.</td></tr>`;
                return;
            }

            files.forEach(file => {
                const row = document.createElement("tr");

                let dateStr = "N/A";
                if (file.uploadedAt) {
                    const date = new Date(file.uploadedAt);
                    dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                const cleanName = file.filename.replace(/\.pdf$/i, "");
                const isPublic = file.isPublic !== false;

                row.innerHTML = `
                    <td title="${file.filename || ''}"><strong>${cleanName}</strong></td>
                    <td><span class="badge badge-subject">${file.folder || 'Private'}</span></td>
                    <td>
                        <span class="badge-visibility ${isPublic ? 'badge-public' : 'badge-private'}">
                            ${isPublic ? 'Public' : 'Private'}
                        </span>
                    </td>
                    <td>${dateStr}</td>
                    <td>
                        <a href="/files/download?key=${encodeURIComponent(file.s3Key)}${!isPublic ? `&token=${encodeURIComponent(token)}` : ''}" class="btn-table-download" target="_blank">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-download"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download
                        </a>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Upload PDF via authenticated request
        async function uploadPDF() {
            const fileInput = document.getElementById("pdfFile");
            const file = fileInput.files[0];
            const folder = document.getElementById("folderSelect").value;
            const visibility = document.getElementById("visibilitySelect").value;
            const isPublic = visibility === "public";
            const btnUpload = document.getElementById("btnUpload");

            if (!file) {
                showStatus("Please select a PDF file first.", "error");
                return;
            }

            if (isPublic && !folder) {
                showStatus("Please select a destination folder.", "error");
                return;
            }

            const formData = new FormData();
            formData.append("pdf", file);
            formData.append("isPublic", isPublic ? "true" : "false");
            if (isPublic) {
                formData.append("folder", folder);
            }

            btnUpload.disabled = true;
            showStatus("Uploading...", "info");

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    },
                    body: formData
                });

                if (response.status === 401 || response.status === 403) {
                    showStatus("Session expired. Please log in again.", "error");
                    setTimeout(logout, 2000);
                    return;
                }

                const result = await response.json();

                if (response.ok && result.success) {
                    showStatus("Upload successful!", "success");
                    fileInput.value = "";
                    updateFileNameLabel();
                    await loadFilesList();
                } else {
                    showStatus(result.message || result.error || "Upload failed", "error");
                }
            } catch (error) {
                console.error(error);
                showStatus("Upload failed: Connection error", "error");
            } finally {
                btnUpload.disabled = false;
            }
        }

        function toggleMobileMenu() {
            const authMenu = document.getElementById("nav-auth");
            if (authMenu) {
                authMenu.classList.toggle("active");
            }
        }

        // Search files in list
        document.getElementById("files-search").addEventListener("input", (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = allFiles.filter(file => {
                return file.filename.toLowerCase().includes(query) ||
                    (file.folder && file.folder.toLowerCase().includes(query));
            });
            renderFilesTable(filtered);
        });

        // Initialize dashboard
        window.addEventListener("DOMContentLoaded", () => {
            loadFolders();
            loadFilesList();
        });
    </script>
</body>

</html>
