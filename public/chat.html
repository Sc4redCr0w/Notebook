<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant - notebook</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Base page layout system */
        body {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Chat-specific overrides and styling */
        .chat-layout {
            padding-top: 90px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            padding-bottom: 1.5rem;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        .chat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 0;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .chat-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.15);
        }

        .active-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        .btn-settings {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-left: auto;
        }

        .btn-settings:hover {
            color: #fff;
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.08);
            transform: rotate(45deg);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 2rem 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-behavior: smooth;
        }

        .message-bubble {
            max-width: 75%;
            padding: 1rem 1.25rem;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: popIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(5px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .message-bubble.user {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .message-bubble.ai {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .sources-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
        }

        .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .source-tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 6px;
            color: var(--secondary);
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .source-tag:hover {
            background: rgba(6, 182, 212, 0.15);
            border-color: var(--secondary);
        }

        .empty-chat {
            text-align: center;
            color: var(--text-secondary);
            margin: auto;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            max-width: 360px;
            padding: 2rem;
        }

        .empty-chat svg {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .chat-input-bar {
            padding: 1.25rem 1.5rem;
            background: rgba(0, 0, 0, 0.25);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
        }

        .chat-input-bar input {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-smooth);
        }

        .chat-input-bar input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .btn-send {
            padding: 0 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-send:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Settings Overlay & Modal */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeInOverlay 0.3s ease;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .settings-overlay .controls-card {
            width: 90%;
            max-width: 420px;
            position: relative;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            animation: slideInModal 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInModal {
            from {
                transform: translateY(30px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .modal-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }

        .controls-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .btn-close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-close-modal:hover {
            color: var(--error);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        select option {
            background: var(--bg-surface);
            color: #fff;
        }

        .user-status-text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .user-status-text span {
            color: #fff;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .chat-layout {
                padding-top: 80px;
                padding-left: 0.75rem;
                padding-right: 0.75rem;
                padding-bottom: 0.75rem;
            }
            .chat-card {
                border-radius: 12px;
            }
            .chat-card-header {
                padding: 0.75rem 1rem;
                font-size: 0.85rem;
            }
            .chat-messages {
                padding: 1rem;
                gap: 1rem;
            }
            .chat-input-bar {
                padding: 0.75rem 1rem;
                gap: 0.75rem;
            }
            .btn-send {
                padding: 0 1rem;
                font-size: 0.9rem;
            }
            .message-bubble {
                max-width: 90%;
            }
        }

        @media (max-width: 400px) {
            .chat-card-header {
                font-size: 0.8rem;
                gap: 0.5rem;
            }
            .chat-card-header div:nth-child(2) {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 150px;
            }
        }

        /* Markdown rendering overrides */
        .ai-content-parsed p {
            margin-bottom: 0.75rem;
        }
        .ai-content-parsed p:last-child {
            margin-bottom: 0;
        }
        .ai-content-parsed ul, .ai-content-parsed ol {
            margin-left: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .ai-content-parsed li {
            margin-bottom: 0.25rem;
        }
        .ai-content-parsed h1, .ai-content-parsed h2, .ai-content-parsed h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .ai-content-parsed code {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.15rem 0.3rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .ai-content-parsed pre {
            background: rgba(0, 0, 0, 0.25);
            padding: 0.75rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
        }
        .ai-content-parsed pre code {
            background: none;
            padding: 0;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-brand" onclick="window.location.href='index.html'">
            <span class="brand-name">notebook</span>
        </div>
        <!-- Hamburger Menu Button -->
        <button class="navbar-toggle" onclick="toggleMobileMenu()" aria-label="Toggle navigation">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="feather feather-menu">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="navbar-menu" id="nav-auth">
            <a href="index.html" class="nav-item">Home</a>
            <a href="explore.html" class="nav-item">Explore Notes</a>
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="chat.html" class="nav-item active">AI Chat</a>
            <button class="nav-item btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Chat Container Layout -->
    <div class="chat-layout">
            <!-- Chat Window -->
            <div class="chat-card">
                <div class="chat-card-header">
                    <div class="active-dot"></div>
                    <div>Groq Llama-3.3 Model Connected</div>
                    <button class="btn-settings" id="btnSettings" onclick="openSettings()" title="Chat Settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="feather feather-settings">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                </div>

                <!-- Messages -->
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-chat" id="emptyChatPlaceholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                            class="feather feather-message-square">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p>Ask a question about the uploaded notebooks to begin the semantic chat pipeline.</p>
                    </div>
                </div>

                <!-- Input bar -->
                <div class="chat-input-bar">
                    <input type="text" id="chatInput" placeholder="Type your question..."
                        onkeydown="handleInputKeydown(event)">
                    <button class="btn-send" id="btnSend" onclick="sendChat()">Ask AI</button>
                </div>
            </div>
        </div>

    <script>
        const token = localStorage.getItem("token");
        const userId = localStorage.getItem("userId");

        if (!token) {
            window.location.href = "login.html";
        } else {
            const userIdDisplayEl = document.getElementById("userIdDisplay");
            if (userIdDisplayEl) userIdDisplayEl.innerText = userId || "Active User";
        }

        function toggleMobileMenu() {
            const authMenu = document.getElementById("nav-auth");
            if (authMenu) {
                authMenu.classList.toggle("active");
            }
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("userId");
            window.location.href = "login.html";
        }

        function handleInputKeydown(event) {
            if (event.key === "Enter") {
                sendChat();
            }
        }

        async function sendChat() {
            const inputField = document.getElementById("chatInput");
            const question = inputField.value.trim();
            const scope = document.getElementById("scopeSelect").value;
            const btnSend = document.getElementById("btnSend");
            const messagesContainer = document.getElementById("chatMessages");
            const placeholder = document.getElementById("emptyChatPlaceholder");

            if (!question) return;

            // Clear input field and disable button
            inputField.value = "";
            btnSend.disabled = true;

            // Remove placeholder if present
            if (placeholder) {
                placeholder.remove();
            }

            // Append user message bubble
            const userBubble = document.createElement("div");
            userBubble.className = "message-bubble user";
            userBubble.innerText = question;
            messagesContainer.appendChild(userBubble);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Append AI typing/loading bubble
            const aiBubble = document.createElement("div");
            aiBubble.className = "message-bubble ai";
            aiBubble.innerText = "Searching notes and writing answer...";
            messagesContainer.appendChild(aiBubble);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ question, scope })
                });

                if (response.status === 401 || response.status === 403) {
                    aiBubble.innerHTML = `<span style="color:var(--error-color)">Session expired. Please redirecting to login...</span>`;
                    setTimeout(logout, 2000);
                    return;
                }

                const result = await response.json();

                if (response.ok) {
                    const formattedAnswer = marked.parse(result.answer || "No response generated.");
                    let responseHtml = `<div class="ai-content-parsed">${formattedAnswer}</div>`;

                    // Render sources list if present
                    if (result.sources && result.sources.length > 0) {
                        responseHtml += `<div class="sources-title">Sources consulted:</div>`;
                        responseHtml += `<div class="sources-list">`;
                        result.sources.forEach(source => {
                            responseHtml += `<span class="source-tag" title="Uploaded by ${source.uploadedBy}">${source.filename} (${source.uploadedBy})</span>`;
                        });
                        responseHtml += `</div>`;
                    }

                    aiBubble.innerHTML = responseHtml;
                } else {
                    aiBubble.innerHTML = `<span style="color:var(--error-color)">Error: ${result.error || "Failed to retrieve response"}</span>`;
                }
            } catch (error) {
                console.error(error);
                aiBubble.innerHTML = `<span style="color:var(--error-color)">Chat connection error occurred.</span>`;
            } finally {
                btnSend.disabled = false;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                inputField.focus();
            }
        }

        function openSettings() {
            document.getElementById("settingsOverlay").style.display = "flex";
        }

        function closeSettings() {
            document.getElementById("settingsOverlay").style.display = "none";
        }

        function handleOverlayClick(event) {
            if (event.target === document.getElementById("settingsOverlay")) {
                closeSettings();
            }
        }
    </script>
    <!-- Settings Modal Overlay -->
    <div id="settingsOverlay" class="settings-overlay" onclick="handleOverlayClick(event)">
        <!-- Sidebar Panel / Modal -->
        <div class="controls-card">
            <div class="modal-header-container">
                <div class="controls-title"
                    style="border-bottom: none; margin-bottom: 0; padding-bottom: 0; color: #fff;">Chat Settings</div>
                <button class="btn-close-modal" onclick="closeSettings()">&times;</button>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label for="scopeSelect">Retrieval Scope</label>
                <select id="scopeSelect" onchange="closeSettings()">
                    <option value="all" selected>All Notes</option>
                    <option value="mine">My Notes Only</option>
                </select>
            </div>

            <div class="user-status-text" style="margin-top: 15px;">
                <p>Current User: <span id="userIdDisplay">User</span></p>
                <p style="margin-top: 8px; font-size: 0.8rem; line-height: 1.4;">
                    Select <strong>My Notes</strong> to only query contexts extracted from your uploaded notebooks.
                </p>
            </div>
        </div>
    </div>

</body>

</html>
