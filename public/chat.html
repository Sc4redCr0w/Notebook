<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook App - AI Chat Assistant</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0b14 0%, #15102a 50%, #06020f 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-glow: #7c4dff;
            --accent-glow: #00e5ff;
            --text-color: #f1f0f7;
            --text-muted: #9fa0b9;
            --success-color: #00e676;
            --error-color: #ff1744;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --user-bubble: linear-gradient(135deg, #7c4dff 0%, #6200ea 100%);
            --ai-bubble: rgba(255, 255, 255, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background decorations */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: 0;
            opacity: 0.25;
            pointer-events: none;
        }

        body::before {
            top: -100px;
            left: -100px;
            background: var(--primary-glow);
        }

        body::after {
            bottom: -150px;
            right: -100px;
            background: var(--accent-glow);
        }

        .chat-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 25px;
            gap: 20px;
        }

        /* Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-glow));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-btn:hover {
            color: var(--accent-glow);
        }

        .btn-logout {
            padding: 8px 16px;
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid rgba(255, 23, 68, 0.3);
            border-radius: 8px;
            color: var(--error-color);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: var(--error-color);
            color: #fff;
        }

        /* Workspace Layout Grid */
        .workspace-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            flex-grow: 1;
        }

        @media (max-width: 850px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Controls sidebar */
        .controls-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
        }

        .controls-title {
            font-size: 1.05rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary-glow);
        }

        select option {
            background: #110e20;
        }

        .user-status-text {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .user-status-text span {
            color: #fff;
            font-weight: 600;
        }

        /* Chat window panel */
        .chat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            height: 600px;
            overflow: hidden;
        }

        .chat-card-header {
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .active-dot {
            width: 8px;
            height: 8px;
            background: var(--success-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success-color);
        }

        /* Message feed viewport */
        .chat-messages {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message-bubble {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* User Message Bubble */
        .message-bubble.user {
            background: var(--user-bubble);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.15);
        }

        /* AI Message Bubble */
        .message-bubble.ai {
            background: var(--ai-bubble);
            border: 1px solid var(--glass-border);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .sources-title {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: 600;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
        }

        .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .source-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 4px;
            color: var(--accent-glow);
            font-weight: 500;
        }

        .empty-chat {
            text-align: center;
            color: var(--text-muted);
            margin: auto;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 320px;
        }

        .empty-chat svg {
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Chat input layout */
        .chat-input-bar {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
        }

        .chat-input-bar input {
            flex-grow: 1;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input-bar input:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.15);
        }

        .btn-send {
            padding: 0 24px;
            background: linear-gradient(90deg, var(--primary-glow), #a07eff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 77, 255, 0.3);
        }

        .btn-send:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <div class="logo-icon">N</div>
                <h1>AI Chat Assistant</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">Upload Dashboard</a>
                <button class="btn-logout" onclick="logout()">Log Out</button>
            </div>
        </header>

        <!-- Workspace Layout -->
        <div class="workspace-grid">
            <!-- Sidebar Panel -->
            <div class="controls-card">
                <div class="controls-title">Chat Settings</div>
                
                <div class="form-group">
                    <label for="scopeSelect">Retrieval Scope</label>
                    <select id="scopeSelect">
                        <option value="all">All Notes</option>
                        <option value="mine">My Notes Only</option>
                    </select>
                </div>

                <div class="user-status-text">
                    <p>Current User: <span id="userIdDisplay">User</span></p>
                    <p style="margin-top: 8px; font-size: 0.8rem; line-height: 1.4;">
                        Select <strong>My Notes</strong> to only query contexts extracted from your uploaded notebooks.
                    </p>
                </div>
            </div>

            <!-- Chat Window -->
            <div class="chat-card">
                <div class="chat-card-header">
                    <div class="active-dot"></div>
                    <div>Groq Llama-3.3 Model Connected</div>
                </div>

                <!-- Messages -->
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-chat" id="emptyChatPlaceholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-message-square"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        <p>Ask a question about the uploaded notebooks to begin the semantic chat pipeline.</p>
                    </div>
                </div>

                <!-- Input bar -->
                <div class="chat-input-bar">
                    <input type="text" id="chatInput" placeholder="Type your question..." onkeydown="handleInputKeydown(event)">
                    <button class="btn-send" id="btnSend" onclick="sendChat()">Ask AI</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const userId = localStorage.getItem("userId");

        if (!token) {
            window.location.href = "login.html";
        } else {
            document.getElementById("userIdDisplay").innerText = userId || "Active User";
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("userId");
            window.location.href = "login.html";
        }

        function handleInputKeydown(event) {
            if (event.key === "Enter") {
                sendChat();
            }
        }

        async function sendChat() {
            const inputField = document.getElementById("chatInput");
            const question = inputField.value.trim();
            const scope = document.getElementById("scopeSelect").value;
            const btnSend = document.getElementById("btnSend");
            const messagesContainer = document.getElementById("chatMessages");
            const placeholder = document.getElementById("emptyChatPlaceholder");

            if (!question) return;

            // Clear input field and disable button
            inputField.value = "";
            btnSend.disabled = true;

            // Remove placeholder if present
            if (placeholder) {
                placeholder.remove();
            }

            // Append user message bubble
            const userBubble = document.createElement("div");
            userBubble.className = "message-bubble user";
            userBubble.innerText = question;
            messagesContainer.appendChild(userBubble);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Append AI typing/loading bubble
            const aiBubble = document.createElement("div");
            aiBubble.className = "message-bubble ai";
            aiBubble.innerText = "Searching notes and writing answer...";
            messagesContainer.appendChild(aiBubble);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ question, scope })
                });

                if (response.status === 401 || response.status === 403) {
                    aiBubble.innerHTML = `<span style="color:var(--error-color)">Session expired. Please redirecting to login...</span>`;
                    setTimeout(logout, 2000);
                    return;
                }

                const result = await response.json();

                if (response.ok) {
                    let responseHtml = `<div>${result.answer || "No response generated."}</div>`;

                    // Render sources list if present
                    if (result.sources && result.sources.length > 0) {
                        responseHtml += `<div class="sources-title">Sources consulted:</div>`;
                        responseHtml += `<div class="sources-list">`;
                        result.sources.forEach(source => {
                            responseHtml += `<span class="source-tag" title="Uploaded by ${source.uploadedBy}">${source.filename} (${source.uploadedBy})</span>`;
                        });
                        responseHtml += `</div>`;
                    }

                    aiBubble.innerHTML = responseHtml;
                } else {
                    aiBubble.innerHTML = `<span style="color:var(--error-color)">Error: ${result.error || "Failed to retrieve response"}</span>`;
                }
            } catch (error) {
                console.error(error);
                aiBubble.innerHTML = `<span style="color:var(--error-color)">Chat connection error occurred.</span>`;
            } finally {
                btnSend.disabled = false;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                inputField.focus();
            }
        }
    </script>
</body>
</html>
