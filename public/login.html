<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook App - Login</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0b14 0%, #15102a 50%, #06020f 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-glow: #7c4dff;
            --accent-glow: #00e5ff;
            --text-color: #f1f0f7;
            --text-muted: #9fa0b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }

        body::before {
            top: 15%;
            left: 20%;
            background: var(--primary-glow);
        }

        body::after {
            bottom: 15%;
            right: 20%;
            background: var(--accent-glow);
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.25);
            background: rgba(0, 0, 0, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--primary-glow), #a07eff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 77, 255, 0.55);
            background: linear-gradient(90deg, #8c60ff, #b394ff);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .status-msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-msg.success {
            display: block;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: #00e676;
        }

        .status-msg.error {
            display: block;
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid rgba(255, 23, 68, 0.3);
            color: #ff1744;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-glow);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            margin-left: 5px;
        }

        .auth-footer a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to upload and manage your files</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="userId">User ID</label>
                <input type="text" id="userId" placeholder="Enter username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit" id="btnLogin">Log In</button>
        </form>

        <div id="statusMsg" class="status-msg"></div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem("token")) {
            window.location.href = "index.html";
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const userId = document.getElementById("userId").value.trim();
            const password = document.getElementById("password").value;
            const statusMsg = document.getElementById("statusMsg");
            const btnLogin = document.getElementById("btnLogin");

            statusMsg.className = "status-msg";
            statusMsg.style.display = "none";
            btnLogin.disabled = true;
            btnLogin.innerText = "Authenticating...";

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ userId, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Store token and userId in local storage
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("userId", userId);
                    
                    statusMsg.innerText = "Login successful! Redirecting...";
                    statusMsg.classList.add("success");
                    
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                } else {
                    statusMsg.innerText = data.error || "Login failed";
                    statusMsg.classList.add("error");
                    btnLogin.disabled = false;
                    btnLogin.innerText = "Log In";
                }
            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Login failed: Connection error";
                statusMsg.classList.add("error");
                btnLogin.disabled = false;
                btnLogin.innerText = "Log In";
            }
        }
    </script>
</body>
</html>
