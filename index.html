<!DOCTYPE html>
<html>
<head>
    <title>S3 PDF Upload</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            max-width:600px;
            margin:50px auto;
        }

        .container{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        select,
        input,
        button{
            padding:12px;
            font-size:16px;
        }

        button{
            cursor:pointer;
        }

        #status{
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Upload PDF</h2>

    <select id="folderSelect">
        <option>Loading folders...</option>
    </select>

    <input
        type="file"
        id="pdfFile"
        accept=".pdf"
    >

    <button onclick="uploadPDF()">
        Upload
    </button>

    <div id="status"></div>

</div>

<script>

async function loadFolders(){

    try{

        const response =
            await fetch("http://localhost:3000/folders");

        const folders =
            await response.json();

        const dropdown =
            document.getElementById("folderSelect");

        dropdown.innerHTML = "";

        folders.forEach(folder => {

            const option =
                document.createElement("option");

            option.value = folder;
            option.textContent = folder;

            dropdown.appendChild(option);

        });

    }
    catch(error){

        console.error(error);

        document.getElementById("status")
            .innerText = "Failed to load folders";

    }

}

async function uploadPDF(){

    const file =
        document.getElementById("pdfFile").files[0];

    const folder =
        document.getElementById("folderSelect").value;

    if(!file){

        alert("Please select a PDF");

        return;
    }

    const formData =
        new FormData();

    formData.append("pdf", file);
    formData.append("folder", folder);

    const status =
        document.getElementById("status");

    status.innerText = "Uploading...";

    try{

        const response =
            await fetch(
                "http://localhost:3000/upload",
                {
                    method:"POST",
                    body:formData
                }
            );

        const result =
            await response.json();

        status.innerText =
            result.message;

    }
    catch(error){

        console.error(error);

        status.innerText =
            "Upload failed";

    }

}

loadFolders();

</script>

</body>
</html>
